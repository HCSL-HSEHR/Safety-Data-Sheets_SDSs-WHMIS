<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Data Sheets (SDS)</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 16px;
}
h2 {
  margin-bottom: 8px;
}
input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 12px;
}
ul {
  list-style: none;
  padding: 0;
}
li {
  margin: 6px 0;
}
a {
  text-decoration: none;
  color: #0066cc;
}
a:hover {
  text-decoration: underline;
}
.breadcrumb {
  font-size: 14px;
  margin-bottom: 10px;
}
.folder {
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Safety Data Sheets (SDS)</h2>

<div class="breadcrumb" id="breadcrumb"></div>

<input type="text" id="search" placeholder="Search by file or folder name..." onkeyup="filterList()">

<ul id="fileList"></ul>

<script>
const owner = "HCSL-HSHER";
const repo = "Safety-Data-Sheets_SDS-WHMIS";

const params = new URLSearchParams(window.location.search);
const path = params.get("path") || "";

const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

fetch(apiUrl)
  .then(res => res.json())
  .then(data => renderList(data));

function renderList(items) {
  const list = document.getElementById("fileList");
  const breadcrumb = document.getElementById("breadcrumb");

  breadcrumb.innerHTML = path
    ? `<a href="?/ ${path}`
    : "Home";

  list.innerHTML = "";

  // Folders first
  items
    .filter(item => item.type === "dir")
    .forEach(item => {
      const li = document.createElement("li");
      li.className = "folder";
      li.innerHTML = `📁 ?path=${item.path}${item.name}</a>`;
      list.appendChild(li);
    });

  // Then PDFs
  items
    .filter(item => item.type === "file" && item.name.toLowerCase().endsWith(".pdf"))
    .forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `📄 <a href="${item.download_url}" target="_blanklist.appendChild(li);
    });
}

function filterList() {
  const filter = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll("#fileList li").forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(filter)
      ? ""
      : "none";
  });
}
</script>

</body>
</html>
