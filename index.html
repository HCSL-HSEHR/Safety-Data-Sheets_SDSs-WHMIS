---
layout: none
---

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Data Sheets (SDS)</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 16px;
}
input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 12px;
}
ul {
  list-style: none;
  padding: 0;
}
li {
  margin: 6px 0;
}
a {
  text-decoration: none;
  color: #0066cc;
}
a:hover {
  text-decoration: underline;
}
.folder {
  font-weight: bold;
}
</style>
</head>
<body>

<h2>Safety Data Sheets (SDS)</h2>

<input type="text" id="search" placeholder="Search by file or folder name…" onkeyup="filterList()">

<ul id="fileList">
{% assign files = site.static_files | sort: "path" %}
{% for file in files %}
  {% unless file.path contains "/.git" %}
    <li>
      📄 <a href="{{ site.baseurl }}{{ file.path }}" target="_blank">
        {{ file.name }}
      </a>
    </li>
  {% endunless %}
{% endfor %}
</ul>

<script>
function filterList() {
  const filter = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll("#fileList li").forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(filter)
      ? ""
      : "none";
  });
}
</script>

</body>
</html>
